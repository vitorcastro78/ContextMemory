name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore ContextMemory.sln

      - name: Build
        run: dotnet build ContextMemory.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/ContextMemory.Api.Tests/ContextMemory.Api.Tests.csproj --configuration Release --no-build --verbosity normal
