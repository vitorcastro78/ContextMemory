# Copy .env.example to .env and adjust secrets before production use.
services:
  context-memory:
    build: .
    ports:
      - "5100:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ContextMemory__OllamaEndpoint=http://ollama:11434
      - ContextMemory__MasterKey=cm_master_dev_key
      - ContextMemory__DataPath=/app/data
      - ContextMemory__WikiPath=/app/wikis
      - ContextMemory__PersistenceProvider=Postgres
      - ContextMemory__KnowledgeLoopEnabled=true
      - ContextMemory__ToolCallEnabled=true
      - ConnectionStrings__ContextMemory=Host=postgres;Database=contextmemory;Username=cm;Password=cm_dev
    volumes:
      - ./data:/app/data
      - ./wikis:/app/wikis
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: contextmemory
      POSTGRES_USER: cm
      POSTGRES_PASSWORD: cm_dev
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cm -d contextmemory"]
      interval: 5s
      timeout: 5s
      retries: 10

  admin-web:
    build:
      context: .
      dockerfile: Dockerfile.admin
    ports:
      - "5200:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ApiBaseUrl=http://context-memory:8080
    depends_on:
      - context-memory

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  pg_data:
  ollama_data:
