# Copy .env.example to .env and adjust secrets before production use.
services:
  context-memory:
    build: .
    ports:
      - "5100:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ContextMemory__OllamaEndpoint=http://ollama:11434
      - ContextMemory__MasterKey=cm_master_dev_key
      - ContextMemory__DataPath=/app/data
      - ContextMemory__WikiPath=/app/wikis
    volumes:
      - ./data:/app/data
      - ./wikis:/app/wikis
    depends_on:
      - ollama

  admin-web:
    build:
      context: .
      dockerfile: Dockerfile.admin
    ports:
      - "5200:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ApiBaseUrl=http://context-memory:8080
    depends_on:
      - context-memory

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  ollama_data:
